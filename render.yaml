# Render Node.js Web Service deployment config.
# Sensitive values marked sync:false must be set in the Render dashboard.

services:
  - type: web
    name: mychinesename-api
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/pricing
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: NODE_VERSION
        value: "20.19.0"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PAYPAL_EMAIL
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: live
      - key: DOMAIN
        value: https://mychinesename.co
      - key: CORS_ORIGIN
        value: https://mychinesename.co
      - key: LOG_LEVEL
        value: error
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
