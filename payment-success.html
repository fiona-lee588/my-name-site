<!DOCTYPE html>
<!-- My Chinese Name - 中文起名服务海外版，生成中文名+拼音+英文释义+寓意 -->
<html lang="zh-CN">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Success - My Chinese Name</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Serif SC",serif}
body{background:#f7f2e9;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.wrap{text-align:center;padding:40px;max-width:600px;}
.check{font-size:80px;margin-bottom:20px;}
h1{color:#8c2318;font-size:28px;margin-bottom:10px;}
p{color:#554433;font-size:16px;line-height:1.8;margin-bottom:20px;}
.btn{display:inline-block;padding:12px 30px;background:#8c2318;color:#fff;text-decoration:none;border-radius:8px;font-size:16px;}
.btn:hover{background:#701c13;}
</style>
</head>
<body>
<div class="wrap">
    <div class="check">✅</div>
    <h1>支付成功！| Payment Successful!</h1>
    <p>感谢您的支持！您的套餐已解锁。<br>Thank you! Your package has been unlocked.</p>
    <p id="pkg-info"></p>
    <a href="/" class="btn">返回首页 | Back to Home</a>
</div>
<script>
(async () => {
    const params = new URLSearchParams(window.location.search);
    const pkg = params.get('package') || '';
    const tx = params.get('paymentId') || params.get('tx');

    if(pkg) {
        document.getElementById('pkg-info').textContent =
            `套餐：${pkg} | Package: ${pkg}`;
    }

    // 解锁套餐
    if(pkg) {
        try {
            await fetch('/api/paypal-checkout', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ package: pkg, transactionId: tx || 'paypal-live' })
            });
        } catch(e) { console.error('Unlock error:', e); }
    }
})();
</script>
</body>
</html>
