<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Success - My Chinese Name</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia,"Times New Roman",serif}
body{background:#f7f2e9;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#3f3024}
.wrap{text-align:center;padding:40px;max-width:620px}
.check{font-size:70px;margin-bottom:18px;color:#2f8f4e}
h1{color:#8c2318;font-size:30px;margin-bottom:12px}
p{color:#554433;font-size:16px;line-height:1.8;margin-bottom:18px}
.status{font-size:14px;color:#886655;min-height:24px}
.btn{display:inline-block;padding:12px 30px;background:#8c2318;color:#fff;text-decoration:none;border-radius:8px;font-size:16px}
.btn:hover{background:#701c13}
</style>
</head>
<body>
<div class="wrap">
    <div class="check">OK</div>
    <h1>Payment Successful</h1>
    <p>Thank you. Your package is being unlocked for this browser.</p>
    <p id="pkg-info"></p>
    <p class="status" id="unlock-status">Confirming your access...</p>
    <a href="/" class="btn">Back to Home</a>
</div>
<script>
const API_BASE = window.API_BASE || (
    ['localhost', '127.0.0.1'].includes(window.location.hostname)
        ? ''
        : 'https://mychinesename-api.onrender.com'
);
const USER_ID_KEY = 'MY_CHINESE_NAME_USER_ID';
function getBrowserUserId(){
    let id = localStorage.getItem(USER_ID_KEY);
    if(!id){
        const rand = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(36).slice(2);
        id = 'u_' + rand.replace(/[^A-Za-z0-9_-]/g, '').slice(0, 48);
        localStorage.setItem(USER_ID_KEY, id);
    }
    return id;
}
function apiUrl(path){ return API_BASE + path; }
function apiHeaders(extra){ return Object.assign({ 'x-user-id': getBrowserUserId() }, extra || {}); }

(async () => {
    const params = new URLSearchParams(window.location.search);
    const pkg = params.get('package') || '';
    const tx = params.get('paymentId') || params.get('tx') || params.get('token') || '';
    const payerId = params.get('PayerID') || params.get('payerId') || '';
    const status = document.getElementById('unlock-status');

    if(pkg) {
        document.getElementById('pkg-info').textContent = `Package: ${pkg}`;
    }
    if(!pkg) {
        status.textContent = 'Payment returned without package information. Please contact support if access is not unlocked.';
        return;
    }

    try {
        const res = await fetch(apiUrl('/api/paypal-checkout'), {
            method: 'POST',
            headers: apiHeaders({'Content-Type':'application/json'}),
            body: JSON.stringify({ package: pkg, transactionId: tx, payerId })
        });
        status.textContent = res.ok
            ? 'Access unlocked. You can return to the homepage now.'
            : 'Payment received, but automatic unlock needs support review.';
    } catch(e) {
        status.textContent = 'Payment received, but automatic unlock could not be confirmed. Please contact support.';
    }
})();
</script>
</body>
</html>
